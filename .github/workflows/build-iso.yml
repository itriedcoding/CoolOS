name: Build CoolOS ISO

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  COOLOS_VERSION: "1.2.0"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          debootstrap squashfs-tools xorriso mtools dosfstools \
          grub-efi-amd64-bin grub-pc-bin \
          mbr binutils isolinux syslinux-common syslinux \
          cpio genisoimage ovmf

    - name: Build CoolOS ISO
      run: |
        set -ex
        WORK=/coolos-build
        sudo rm -rf "$WORK"
        sudo mkdir -p "$WORK"
        cd "$WORK"
        
        ROOTFS="$WORK/chroot"
        IMAGE="$WORK/image"
        SQUASH="$WORK/squashfs"
        ISO_NAME="CoolOS-1.2.0-amd64.iso"
        
        # --- 1. Debootstrap ---
        sudo debootstrap --arch=amd64 bookworm "$ROOTFS" http://deb.debian.org/debian/
        
        # --- 2. Configure the chroot ---
        sudo chroot "$ROOTFS" bash -c '
          set -e
          echo "CoolOS" > /etc/hostname
          echo "127.0.0.1 localhost CoolOS" > /etc/hosts
          
          echo "deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware" > /etc/apt/sources.list
          echo "deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware" >> /etc/apt/sources.list
          echo "deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware" >> /etc/apt/sources.list
          
          echo "en_US.UTF-8 UTF-8" > /etc/locale.gen
          locale-gen
          update-locale LANG=en_US.UTF-8
          ln -sf /usr/share/zoneinfo/UTC /etc/localtime
          
          apt-get update
          apt-get install -y \
            linux-image-amd64 \
            systemd systemd-sysv dbus udev kmod procps locales sudo \
            openbox tint2 rofi pcmanfm thunar lxterminal \
            lightdm lightdm-gtk-greeter picom dunst nitrogen lxappearance \
            arc-theme papirus-icon-theme \
            fonts-noto fonts-noto-color-emoji fonts-firacode fonts-dejavu fonts-liberation \
            xorg xserver-xorg xinit x11-xserver-utils xterm dbus-x11 \
            firefox-esr libreoffice-writer libreoffice-calc libreoffice-impress \
            vlc mpv gimp inkscape geany evince galculator file-roller \
            network-manager network-manager-gnome \
            gnome-system-monitor baobab ncdu ufw \
            pulseaudio pavucontrol \
            build-essential git python3 curl wget vim-tiny nano \
            htop tmux tree zip unzip p7zip-full \
            live-boot live-config live-config-systemd \
            live-config-systemd || true
          
          useradd -m -s /bin/bash -G sudo,audio,video,plugdev,netdev coolos || true
          echo "coolos:coolors" | chpasswd
          echo "root:coolors" | chpasswd
          echo "coolos ALL=(ALL) ALL" > /etc/sudoers.d/coolos
          chmod 440 /etc/sudoers.d/coolos
          
          systemctl enable NetworkManager 2>/dev/null || true
          systemctl enable lightdm 2>/dev/null || true
          
          mkdir -p /etc/xdg/openbox
          cat > /etc/xdg/openbox/autostart << '"'"'AUTO'"'"'
          #!/bin/sh
          nitrogen --restore &
          tint2 &
          picom --experimental-backends &
          dunst &
          pcmanfm --daemon &
          xset r rate 300 50
          xsetroot -cursor_name left_ptr
          AUTO
          chmod +x /etc/xdg/openbox/autostart
          
          mkdir -p /etc/lightdm/lightdm.conf.d
          cat > /etc/lightdm/lightdm.conf.d/50-coolos.conf << '"'"'LDM'"'"'
          [Seat:*]
          autologin-user=coolos
          autologin-user-timeout=0
          user-session=openbox
          greeter-session=lightdm-gtk-greeter
          LDM
          
          mkdir -p /home/coolos/.config/{openbox,tint2}
          cp /etc/xdg/openbox/autostart /home/coolos/.config/openbox/
          chown -R 1000:1000 /home/coolos
        '
        
        # --- 3. Create squashfs ---
        sudo mkdir -p "$SQUASH"
        sudo mksquashfs "$ROOTFS" "$SQUASH/filesystem.squashfs" -comp xz -e boot
        
        # --- 4. Assemble image directory ---
        mkdir -p "$IMAGE/boot/grub/x86_64-efi"
        mkdir -p "$IMAGE/boot/grub/i386-pc"
        mkdir -p "$IMAGE/boot/isolinux"
        mkdir -p "$IMAGE/live"
        
        cp "$SQUASH/filesystem.squashfs" "$IMAGE/live/"
        
        # Copy kernel and initrd
        cp "$ROOTFS/boot/vmlinuz-"* "$IMAGE/boot/vmlinuz" 2>/dev/null || \
          sudo cp "$ROOTFS/boot/vmlinuz-"* "$IMAGE/boot/"
        cp "$ROOTFS/boot/initrd.img-"* "$IMAGE/boot/initrd.img" 2>/dev/null || \
          sudo cp "$ROOTFS/boot/initrd.img-"* "$IMAGE/boot/"
        
        # Find kernel version
        KVER=$(ls "$ROOTFS/boot/" | grep -E "^vmlinuz-" | head -1 | sed 's/vmlinuz-//')
        echo "Kernel: $KVER"
        sudo cp "$ROOTFS/boot/vmlinuz-$KVER" "$IMAGE/boot/vmlinuz"
        sudo cp "$ROOTFS/boot/initrd.img-$KVER" "$IMAGE/boot/initrd.img"
        
        # --- 5. GRUB config ---
        cat > "$IMAGE/boot/grub/grub.cfg" << 'GRUBCFG'
        set default=0
        set timeout=5
        set gfxpayload=keep
        
        menuentry "CoolOS Live" {
          linux /boot/vmlinuz boot=live quiet splash
          initrd /boot/initrd.img
        }
        
        menuentry "CoolOS Live (safe mode)" {
          linux /boot/vmlinuz boot=live quiet splash nomodeset
          initrd /boot/initrd.img
        }
        GRUBCFG
        
        # --- 6. Isolinux config ---
        cat > "$IMAGE/boot/isolinux/isolinux.cfg" << 'ISOLINUX'
        UI vesamenu.c32
        MENU TITLE CoolOS Boot Menu
        DEFAULT coolos
        TIMEOUT 50
        
        LABEL coolos
          MENU LABEL CoolOS Live
          LINUX /boot/vmlinuz
          INITRD /boot/initrd.img
          APPEND boot=live quiet splash
        
        LABEL coolos-safe
          MENU LABEL CoolOS Live (safe mode)
          LINUX /boot/vmlinuz
          INITRD /boot/initrd.img
          APPEND boot=live quiet splash nomodeset
        ISOLINUX
        
        cp /usr/lib/ISOLINUX/isolinux.bin "$IMAGE/boot/isolinux/"
        cp /usr/lib/syslinux/modules/bios/vesamenu.c32 "$IMAGE/boot/isolinux/" 2>/dev/null || true
        cp /usr/lib/syslinux/modules/bios/ldlinux.c32 "$IMAGE/boot/isolinux/" 2>/dev/null || true
        
        # --- 7. Create GRUB EFI standalone image (ALL modules embedded) ---
        grub-mkstandalone \
          --format=x86_64-efi \
          --modules="" \
          --locales="" \
          --fonts="" \
          -o "$IMAGE/boot/grub/x86_64-efi/BOOTX64.EFI" \
          "boot/grub/grub.cfg=$IMAGE/boot/grub/grub.cfg"
        
        # Create GRUB BIOS core image
        grub-mkimage \
          -O i386-pc \
          -o "$IMAGE/boot/grub/i386-pc/core.img" \
          -p '(cd)/boot/grub' \
          biosdisk iso9660 part_msdos normal configfile linux search boot cat ls echo test set insmod loadenv all_video gzio fat \
          || echo "BIOS GRUB image creation skipped (non-critical)"
        
        cp /usr/lib/grub/i386-pc/lnxboot.img "$IMAGE/boot/grub/i386-pc/" 2>/dev/null || true
        cp /usr/lib/grub/i386-pc/boot.img "$IMAGE/boot/grub/i386-pc/" 2>/dev/null || true
        
        # --- 8. Create ISO ---
        cd "$WORK"
        
        # Create El Torito catalog
        XORRISO_CMD="xorriso -as mkisofs \
          -r -J \
          -V 'CoolOS' \
          -o "$ISO_NAME" \
          --grub2-mbr /usr/lib/grub/i386-pc/boot.img \
          --grub2-boot-info \
          -eltorito-boot boot/isolinux/isolinux.bin \
            -no-emul-boot \
            -boot-load-size 4 \
            -boot-info-table \
            --eltorito-catalog boot/isolinux/boot.cat \
          -eltorito-alt-boot \
            -e boot/grub/x86_64-efi/BOOTX64.EFI \
            -no-emul-boot \
            -isohybrid-gpt-basdat \
          $IMAGE"
        
        eval $XORRISO_CMD
        
        # --- 9. Verify ---
        ls -lh "$ISO_NAME"
        sha256sum "$ISO_NAME"
        
        # Verify ISO has correct boot structures
        xorriso -indev "$ISO_NAME" -report_el_torito as_mkisofs 2>&1 | grep -i boot || true
        
        mkdir -p /coolos-build/output
        mv "$ISO_NAME" /coolos-build/output/
        cd /coolos-build/output
        sha256sum *.iso > SHA256SUMS
        
        echo "BUILD COMPLETE"
        ls -lh

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: CoolOS-1.2.0-amd64
        path: /coolos-build/output/*.iso
        retention-days: 30

    - name: Upload checksums
      uses: actions/upload-artifact@v4
      with:
        name: checksums
        path: /coolos-build/output/SHA256SUMS

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
    - name: Download ISO
      uses: actions/download-artifact@v4
      with:
        name: CoolOS-1.2.0-amd64

    - name: Download checksums
      uses: actions/download-artifact@v4
      with:
        name: checksums

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: CoolOS 1.2.0
        body: |
          ## CoolOS 1.2.0
          
          **Default Credentials:** coolos / coolors
          
          ### What changed
          - ISO rebuilt with grub-mkstandalone (self-contained EFI binary, no external modules needed)
          - Proper El Torito boot for both BIOS (isolinux) and UEFI (GRUB)
          - Works with Hyper-V Gen2, VirtualBox, VMware, QEMU
          
          ### Hyper-V Setup
          1. Create Generation 2 VM
          2. Set 2048MB+ RAM
          3. **Disable Secure Boot** (VM Settings > Security > Uncheck Secure Boot)
          4. Attach ISO to DVD Drive
          5. Set DVD as first boot device
          6. Start VM
          
          ### Verify
          ```bash
          sha256sum -c SHA256SUMS
          ```
        files: |
          *.iso
          SHA256SUMS
        draft: false
        prerelease: false
