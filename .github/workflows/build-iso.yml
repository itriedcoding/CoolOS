name: Build CoolOS ISO

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  COOLOS_VERSION: "1.2.2"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          debootstrap squashfs-tools xorriso mtools dosfstools \
          grub-efi-amd64-bin grub-pc-bin \
          mbr binutils isolinux syslinux-common syslinux \
          cpio genisoimage ovmf

    - name: Build CoolOS ISO
      run: |
        cat > /tmp/build-coolos.sh << 'BUILDEOF'
        #!/bin/bash
        set -ex
        WORK=/coolos-build
        rm -rf "$WORK"
        mkdir -p "$WORK"
        cd "$WORK"
        
        ROOTFS="$WORK/chroot"
        IMAGE="$WORK/image"
        SQUASH="$WORK/squashfs"
        ISO_NAME="CoolOS-1.2.2-amd64.iso"
        
        # --- 1. Debootstrap ---
        debootstrap --arch=amd64 bookworm "$ROOTFS" http://deb.debian.org/debian/
        
        # --- 2. Basic chroot config ---
        echo "CoolOS" > "$ROOTFS/etc/hostname"
        echo "127.0.0.1 localhost CoolOS" > "$ROOTFS/etc/hosts"
        
        cat > "$ROOTFS/etc/apt/sources.list" << 'SOURCES'
        deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
        deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
        deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
        SOURCES
        
        ln -sf /usr/share/zoneinfo/UTC "$ROOTFS/etc/localtime"
        
        # --- 3. Install packages ---
        chroot "$ROOTFS" apt-get update
        chroot "$ROOTFS" apt-get install -y locales
        chroot "$ROOTFS" bash -c 'echo "en_US.UTF-8 UTF-8" > /etc/locale.gen && locale-gen && update-locale LANG=en_US.UTF-8'
        
        chroot "$ROOTFS" apt-get install -y \
          linux-image-amd64 \
          systemd systemd-sysv dbus udev kmod procps locales sudo \
          openbox tint2 rofi pcmanfm thunar lxterminal \
          lightdm lightdm-gtk-greeter picom dunst nitrogen lxappearance \
          arc-theme papirus-icon-theme \
          fonts-firacode fonts-dejavu fonts-liberation \
          xorg xserver-xorg xinit x11-xserver-utils xterm dbus-x11 \
          firefox-esr \
          vlc galculator file-roller \
          network-manager network-manager-gnome \
          ncdu ufw \
          pulseaudio pavucontrol \
          python3 curl wget vim-tiny nano \
          htop tmux tree zip unzip \
          live-boot live-config live-config-systemd
        
        # --- 4. User setup ---
        chroot "$ROOTFS" bash -c '
          useradd -m -s /bin/bash -G sudo,audio,video,plugdev,netdev coolos || true
          echo "coolos:coolors" | chpasswd
          echo "root:coolors" | chpasswd
          echo "coolos ALL=(ALL) ALL" > /etc/sudoers.d/coolos
          chmod 440 /etc/sudoers.d/coolos
          systemctl enable NetworkManager 2>/dev/null || true
          systemctl enable lightdm 2>/dev/null || true
        '
        
        # --- 5. Desktop config (write directly to rootfs) ---
        mkdir -p "$ROOTFS/etc/xdg/openbox"
        cat > "$ROOTFS/etc/xdg/openbox/autostart" << 'AUTO'
        #!/bin/sh
        nitrogen --restore &
        tint2 &
        picom --experimental-backends &
        dunst &
        pcmanfm --daemon &
        xset r rate 300 50
        xsetroot -cursor_name left_ptr
        AUTO
        chmod +x "$ROOTFS/etc/xdg/openbox/autostart"
        
        mkdir -p "$ROOTFS/etc/lightdm/lightdm.conf.d"
        cat > "$ROOTFS/etc/lightdm/lightdm.conf.d/50-coolos.conf" << 'LDM'
        [Seat:*]
        autologin-user=coolos
        autologin-user-timeout=0
        user-session=openbox
        greeter-session=lightdm-gtk-greeter
        LDM
        
        mkdir -p "$ROOTFS/home/coolos/.config/openbox"
        mkdir -p "$ROOTFS/home/coolos/.config/tint2"
        cp "$ROOTFS/etc/xdg/openbox/autostart" "$ROOTFS/home/coolos/.config/openbox/"
        chown -R 1000:1000 "$ROOTFS/home/coolos"
        
        # --- 6. Cleanup before squashfs ---
        rm -rf "$ROOTFS"/var/cache/apt/archives/*.deb
        rm -rf "$ROOTFS"/var/lib/apt/lists/*
        rm -rf "$ROOTFS"/usr/share/doc/*
        rm -rf "$ROOTFS"/usr/share/man/*
        rm -rf "$ROOTFS"/usr/share/info/*
        
        # --- 7. Create squashfs ---
        mkdir -p "$SQUASH"
        mksquashfs "$ROOTFS" "$SQUASH/filesystem.squashfs" -comp xz -Xbcj x86 -b 1M -e boot
        
        # --- 8. Assemble image directory ---
        mkdir -p "$IMAGE/boot/grub/x86_64-efi"
        mkdir -p "$IMAGE/boot/isolinux"
        mkdir -p "$IMAGE/live"
        cp "$SQUASH/filesystem.squashfs" "$IMAGE/live/"
        
        KVER=$(ls "$ROOTFS/boot/" | grep -E "^vmlinuz-" | head -1 | sed 's/vmlinuz-//')
        echo "Kernel: $KVER"
        cp "$ROOTFS/boot/vmlinuz-$KVER" "$IMAGE/boot/vmlinuz"
        cp "$ROOTFS/boot/initrd.img-$KVER" "$IMAGE/boot/initrd.img"
        
        # --- 9. GRUB config ---
        cat > "$IMAGE/boot/grub/grub.cfg" << 'GRUBCFG'
        set default=0
        set timeout=5
        set gfxpayload=keep
        menuentry "CoolOS Live" {
          linux /boot/vmlinuz boot=live quiet splash
          initrd /boot/initrd.img
        }
        menuentry "CoolOS Live (safe mode)" {
          linux /boot/vmlinuz boot=live quiet splash nomodeset
          initrd /boot/initrd.img
        }
        GRUBCFG
        
        # --- 10. Isolinux ---
        cat > "$IMAGE/boot/isolinux/isolinux.cfg" << 'ISOLINUX'
        UI vesamenu.c32
        MENU TITLE CoolOS Boot Menu
        DEFAULT coolos
        TIMEOUT 50
        LABEL coolos
          MENU LABEL CoolOS Live
          LINUX /boot/vmlinuz
          INITRD /boot/initrd.img
          APPEND boot=live quiet splash
        LABEL coolos-safe
          MENU LABEL CoolOS Live (safe mode)
          LINUX /boot/vmlinuz
          INITRD /boot/initrd.img
          APPEND boot=live quiet splash nomodeset
        ISOLINUX
        
        cp /usr/lib/ISOLINUX/isolinux.bin "$IMAGE/boot/isolinux/"
        cp /usr/lib/syslinux/modules/bios/vesamenu.c32 "$IMAGE/boot/isolinux/" 2>/dev/null || true
        cp /usr/lib/syslinux/modules/bios/ldlinux.c32 "$IMAGE/boot/isolinux/" 2>/dev/null || true
        
        # --- 11. GRUB EFI standalone (all modules embedded) ---
        grub-mkstandalone \
          --format=x86_64-efi \
          --modules="" \
          --locales="" \
          --fonts="" \
          -o "$IMAGE/boot/grub/x86_64-efi/BOOTX64.EFI" \
          "boot/grub/grub.cfg=$IMAGE/boot/grub/grub.cfg"
        
        # --- 12. Create ISO ---
        cd "$WORK"
        xorriso -as mkisofs \
          -r -J \
          -V 'CoolOS' \
          -o "$ISO_NAME" \
          --grub2-mbr /usr/lib/grub/i386-pc/boot.img \
          --grub2-boot-info \
          -eltorito-boot boot/isolinux/isolinux.bin \
            -no-emul-boot \
            -boot-load-size 4 \
            -boot-info-table \
            --eltorito-catalog boot/isolinux/boot.cat \
          -eltorito-alt-boot \
            -e boot/grub/x86_64-efi/BOOTX64.EFI \
            -no-emul-boot \
            -isohybrid-gpt-basdat \
          "$IMAGE"
        
        ls -lh "$ISO_NAME"
        sha256sum "$ISO_NAME"
        mkdir -p /coolos-build/output
        mv "$ISO_NAME" /coolos-build/output/
        cd /coolos-build/output
        sha256sum *.iso > SHA256SUMS
        echo "BUILD COMPLETE"
        ls -lh
        BUILDEOF
        chmod +x /tmp/build-coolos.sh
        sudo /tmp/build-coolos.sh

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: CoolOS-1.2.2-amd64
        path: /coolos-build/output/*.iso
        retention-days: 30

    - name: Upload checksums
      uses: actions/upload-artifact@v4
      with:
        name: checksums
        path: /coolos-build/output/SHA256SUMS

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
    - name: Download ISO
      uses: actions/download-artifact@v4
      with:
        name: CoolOS-1.2.2-amd64

    - name: Download checksums
      uses: actions/download-artifact@v4
      with:
        name: checksums

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: CoolOS 1.2.2
        body: |
          ## CoolOS 1.2.2
          
          **Default Credentials:** coolos / coolors
          
          ### What changed
          - ISO rebuilt with grub-mkstandalone (self-contained EFI binary)
          - Proper El Torito boot for BIOS (isolinux) + UEFI (GRUB)
          - Trimmed ISO to fit GitHub's 2GB upload limit
          - Works with Hyper-V Gen2, VirtualBox, VMware, QEMU
          
          ### Hyper-V Setup
          1. Create Generation 2 VM
          2. Set 2048MB+ RAM
          3. **Disable Secure Boot** (Settings > Security)
          4. Attach ISO to DVD
          5. Start
          
          ### Included Software
          - Firefox ESR, VLC, Thunar, GIMP, Openbox + Tint2
          - LibreOffice, Inkscape, build-essential available via:
            `sudo apt install libreoffice gimp inkscape build-essential`
          
          ### Verify
          ```bash
          sha256sum -c SHA256SUMS
          ```
        files: |
          *.iso
          SHA256SUMS
        draft: false
        prerelease: false
