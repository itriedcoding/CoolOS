name: Build CoolOS ISO

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  COOLOS_VERSION: "1.2.0"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          debootstrap squashfs-tools xorriso mtools dosfstools \
          grub-efi-amd64-bin grub-efi-amd64-signed shim-signed \
          mbr binutils isolinux syslinux-common syslinux \
          cpio genisoimage live-build ovmf

    - name: Create build script
      run: |
        cat > /tmp/build-coolos.sh << 'BUILDEOF'
        #!/bin/bash
        set -ex
        
        BUILD=/coolos-build
        rm -rf $BUILD
        mkdir -p $BUILD && cd $BUILD
        
        # Initialize live-build
        lb config \
          --architectures amd64 \
          --distribution bookworm \
          --archive-areas "main contrib non-free non-free-firmware" \
          --binary-images iso-hybrid \
          --debian-installer none \
          --memtest none \
          --mirror-bootstrap http://deb.debian.org/debian/ \
          --mirror-chroot http://deb.debian.org/debian/ \
          --mirror-chroot-security http://security.debian.org/debian-security \
          --iso-application "CoolOS" \
          --iso-publisher "CoolOS" \
          --iso-volume "CoolOS 1.2.0" \
          --bootappend-live "boot=live quiet splash"
        
        # Package list
        mkdir -p config/package-lists
        cat > config/package-lists/coolors.list.chroot << 'PKGS'
        linux-image-amd64
        systemd systemd-sysv dbus udev kmod procps locales sudo
        openbox tint2 rofi pcmanfm thunar lxterminal
        lightdm lightdm-gtk-greeter picom dunst nitrogen lxappearance
        arc-theme papirus-icon-theme
        fonts-noto fonts-noto-color-emoji fonts-firacode fonts-dejavu fonts-liberation
        xorg xserver-xorg xinit x11-xserver-utils xterm dbus-x11
        firefox-esr libreoffice-writer libreoffice-calc libreoffice-impress
        vlc mpv gimp inkscape geany evince galculator file-roller
        network-manager network-manager-gnome
        gnome-system-monitor baobab ncdu ufw
        pulseaudio pavucontrol
        build-essential git python3 curl wget vim-tiny nano
        htop tmux tree zip unzip p7zip-full
        live-boot live-config live-config-systemd
        PKGS
        
        # Hooks
        mkdir -p config/hooks/live
        
        cat > config/hooks/live/0100-users.chroot << 'HOOK'
        #!/bin/sh
        set -e
        echo "CoolOS" > /etc/hostname
        echo "127.0.0.1 localhost CoolOS" > /etc/hosts
        echo "en_US.UTF-8 UTF-8" > /etc/locale.gen
        locale-gen
        update-locale LANG=en_US.UTF-8
        ln -sf /usr/share/zoneinfo/UTC /etc/localtime
        useradd -m -s /bin/bash -G sudo,audio,video,plugdev,netdev coolos || true
        echo "coolos:coolors" | chpasswd
        echo "root:coolors" | chpasswd
        echo "coolos ALL=(ALL) ALL" > /etc/sudoers.d/coolos
        chmod 440 /etc/sudoers.d/coolos
        systemctl enable NetworkManager 2>/dev/null || true
        HOOK
        chmod +x config/hooks/live/0100-users.chroot
        
        cat > config/hooks/live/0200-desktop.chroot << 'HOOK'
        #!/bin/sh
        set -e
        mkdir -p /etc/xdg/openbox
        mkdir -p /etc/skel/.config/{openbox,tint2}
        mkdir -p /etc/lightdm/lightdm.conf.d
        
        cat > /etc/xdg/openbox/autostart << 'AUTO'
        #!/bin/sh
        nitrogen --restore &
        tint2 &
        picom --experimental-backends &
        dunst &
        pcmanfm --daemon &
        xset r rate 300 50
        xsetroot -cursor_name left_ptr
        AUTO
        chmod +x /etc/xdg/openbox/autostart
        
        cat > /etc/lightdm/lightdm.conf.d/50-coolos.conf << 'LDM'
        [Seat:*]
        autologin-user=coolos
        autologin-user-timeout=0
        user-session=openbox
        greeter-session=lightdm-gtk-greeter
        LDM
        
        mkdir -p /home/coolos/.config/{openbox,tint2}
        cp /etc/xdg/openbox/autostart /home/coolos/.config/openbox/
        chown -R 1000:1000 /home/coolos
        HOOK
        chmod +x config/hooks/live/0200-desktop.chroot
        
        # Build
        lb build 2>&1 | tail -50 || true
        
        # Find ISO
        ISO_FILE=$(ls -1 *.iso 2>/dev/null | head -n1)
        if [ -z "$ISO_FILE" ]; then
          echo "ERROR: No ISO found!"
          ls -la
          exit 1
        fi
        
        mkdir -p /coolos-build/output
        mv "$ISO_FILE" /coolos-build/output/
        cd /coolos-build/output
        sha256sum *.iso > SHA256SUMS
        
        echo "BUILD COMPLETE"
        ls -lh
        BUILDEOF
        chmod +x /tmp/build-coolos.sh

    - name: Run build
      run: sudo /tmp/build-coolos.sh

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: CoolOS-1.2.0-amd64
        path: /coolos-build/output/*.iso
        retention-days: 30

    - name: Upload checksums
      uses: actions/upload-artifact@v4
      with:
        name: checksums
        path: /coolos-build/output/SHA256SUMS

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
    - name: Download ISO
      uses: actions/download-artifact@v4
      with:
        name: CoolOS-1.2.0-amd64

    - name: Download checksums
      uses: actions/download-artifact@v4
      with:
        name: checksums

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: CoolOS 1.2.0
        body: |
          ## CoolOS 1.2.0
          
          **Default Credentials:** coolos / coolors
          
          ### Fixed
          - Rebuilt with Debian live-build for proper UEFI/BIOS boot
          - Works with Hyper-V Gen2 (disable Secure Boot)
          - Works with VMware, VirtualBox, QEMU
          
          ### Hyper-V Setup
          1. Gen 2 VM, 2048MB+ RAM
          2. Disable Secure Boot
          3. Attach ISO to DVD
          4. Boot
          
          ### Verify
          ```bash
          sha256sum -c SHA256SUMS
          ```
        files: |
          *.iso
          SHA256SUMS
        draft: false
        prerelease: false
